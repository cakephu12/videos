<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemutar Video</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* Bagian Atas (Header) */
        header {
            width: 100%;
            background: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            border-bottom: 1px solid #eaeaea;
        }
        .logo { font-weight: bold; font-size: 1.2rem; }
        .upload-btn {
            background: #1a202c;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
        }
        /* Wadah Video */
        .video-container {
            margin-top: 20px;
            width: 95%;
            max-width: 450px; /* Ukuran tampilan HP */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        video {
            width: 100%;
            border-radius: 15px;
            background: black;
            outline: none;
        }
        .video-info {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #666;
        }
        .download-link {
            margin-top: 10px;
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
        }
        /* Tombol Video 1 & 2 */
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            width: 100%;
        }
        .btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .btn-orange { background-color: #ff5e3a; }
        .btn-blue { background-color: #1da1f2; }
        
        /* Slot Iklan */
        .ad-slot {
            margin-top: 25px;
            width: 100%;
            max-width: 600px;
            height: 90px;
            border: 2px dashed #d1d5db;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #6b7280;
            background: #f9fafb;
            border-radius: 8px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">videy.co</div>
        <a href="#" class="upload-btn">Upload</a>
    </header>

    <div class="video-container">
        
        <video controls>
            <source src="video.mp4" type="video/mp4">
            Browser Anda tidak mendukung pemutar video.
        </video>
        
        <div class="video-info">0:00 / 0:42</div>
        <a href="#" class="download-link">Download video panjang</a>

        <div class="buttons">
            <a href="#" class="btn btn-orange">VIDEO 1</a>
            <a href="#" class="btn btn-blue">VIDEO 2</a>
        </div>

        <div class="ad-slot">
            Slot Iklan 728x90 (contoh)
        </div>
    </div>

</body>
</html>
